<svg viewBox="0 0 740 1080" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>Fluxo IA de Atendimento — Bellex</title>
  <desc>Fluxograma completo do atendimento via IA: da mensagem do paciente no WhatsApp até a resposta, passando por EvoAPI, Edge Function, Redis, OpenAI e ações automáticas.</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888780"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1D9E75"/>
    </marker>
    <marker id="arr-coral" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D85A30"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#BA7517"/>
    </marker>
  </defs>

  <!-- BG -->
  <rect width="740" height="1080" fill="#f5f5f3" rx="0"/>

  <!-- TÍTULO -->
  <text x="370" y="36" text-anchor="middle" font-size="16" font-weight="500" fill="#1a1a1a">Fluxo IA de Atendimento</text>
  <text x="370" y="54" text-anchor="middle" font-size="11" fill="#888">Bellex · WhatsApp → EvoAPI → Edge Function → OpenAI</text>

  <!-- ============ LAYER LABELS ============ -->
  <text x="18" y="120" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="0.08em">PACIENTE</text>
  <text x="18" y="230" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="0.08em">ENTRADA</text>
  <text x="18" y="390" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="0.08em">CONTEXTO</text>
  <text x="18" y="570" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="0.08em">IA</text>
  <text x="18" y="720" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="0.08em">DECISÃO</text>
  <text x="18" y="900" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="0.08em">SAÍDA</text>

  <!-- ============ 1. PACIENTE ============ -->
  <!-- WhatsApp bubble -->
  <rect x="260" y="72" width="220" height="64" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="370" y="96" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Paciente envia mensagem</text>
  <text x="370" y="114" text-anchor="middle" font-size="11" fill="#0F6E56">WhatsApp</text>
  <text x="370" y="128" text-anchor="middle" font-size="10" fill="#1D9E75">texto · áudio · imagem</text>

  <!-- seta 1 -->
  <line x1="370" y1="136" x2="370" y2="164" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ 2. EVOAPI ============ -->
  <rect x="260" y="164" width="220" height="52" rx="8" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="370" y="187" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">EvoAPI</text>
  <text x="370" y="204" text-anchor="middle" font-size="10" fill="#888">Webhook → POST Supabase Edge Fn</text>

  <!-- seta 2 -->
  <line x1="370" y1="216" x2="370" y2="244" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ 3. EDGE FUNCTION ============ -->
  <rect x="230" y="244" width="280" height="52" rx="8" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="370" y="267" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Supabase Edge Function</text>
  <text x="370" y="284" text-anchor="middle" font-size="10" fill="#888">recebe payload · identifica clínica pelo número</text>

  <!-- seta 3 → bifurca para Redis e Supabase -->
  <line x1="370" y1="296" x2="370" y2="320" stroke="#888" stroke-width="1.5"/>
  <!-- linha horizontal -->
  <line x1="200" y1="320" x2="540" y2="320" stroke="#888" stroke-width="1.5"/>
  <!-- seta esq -->
  <line x1="200" y1="320" x2="200" y2="348" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- seta dir -->
  <line x1="540" y1="320" x2="540" y2="348" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ 4a. REDIS (esquerda) ============ -->
  <rect x="100" y="348" width="200" height="64" rx="8" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="200" y="372" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Redis</text>
  <text x="200" y="389" text-anchor="middle" font-size="10" fill="#888">histórico das últimas</text>
  <text x="200" y="403" text-anchor="middle" font-size="10" fill="#888">10 mensagens do paciente</text>

  <!-- ============ 4b. SUPABASE (direita) ============ -->
  <rect x="440" y="348" width="200" height="64" rx="8" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="540" y="372" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Supabase DB</text>
  <text x="540" y="389" text-anchor="middle" font-size="10" fill="#888">contexto da clínica: serviços,</text>
  <text x="540" y="403" text-anchor="middle" font-size="10" fill="#888">horários, paciente cadastrado</text>

  <!-- setas de volta para centro -->
  <line x1="200" y1="412" x2="200" y2="460" stroke="#888" stroke-width="1.5"/>
  <line x1="540" y1="412" x2="540" y2="460" stroke="#888" stroke-width="1.5"/>
  <line x1="200" y1="460" x2="540" y2="460" stroke="#888" stroke-width="1.5"/>
  <line x1="370" y1="460" x2="370" y2="488" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ 5. BUILD PROMPT ============ -->
  <rect x="230" y="488" width="280" height="52" rx="8" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="370" y="511" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Montar prompt</text>
  <text x="370" y="528" text-anchor="middle" font-size="10" fill="#888">system prompt da clínica + histórico + mensagem</text>

  <!-- seta 5 -->
  <line x1="370" y1="540" x2="370" y2="568" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ 6. OPENAI ============ -->
  <rect x="230" y="568" width="280" height="64" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="370" y="594" text-anchor="middle" font-size="13" font-weight="500" fill="#042C53">OpenAI GPT-4o mini</text>
  <text x="370" y="612" text-anchor="middle" font-size="10" fill="#185FA5">~65k tokens/conversa · ~R$ 0,15/atend.</text>
  <text x="370" y="626" text-anchor="middle" font-size="10" fill="#185FA5">gera resposta + ação (JSON)</text>

  <!-- seta 6 -->
  <line x1="370" y1="632" x2="370" y2="660" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ 7. PARSE RESPOSTA ============ -->
  <rect x="230" y="660" width="280" height="52" rx="8" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="370" y="683" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Parse da resposta</text>
  <text x="370" y="700" text-anchor="middle" font-size="10" fill="#888">extrair: texto · action · dados</text>

  <!-- seta 7 → decisão -->
  <line x1="370" y1="712" x2="370" y2="740" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ 8. LOSANGO DECISÃO ============ -->
  <polygon points="370,740 470,780 370,820 270,780" fill="#fff" stroke="#888780" stroke-width="1"/>
  <text x="370" y="775" text-anchor="middle" font-size="11" font-weight="500" fill="#2C2C2A">tem ação?</text>
  <text x="370" y="791" text-anchor="middle" font-size="10" fill="#888">action field no JSON</text>

  <!-- SIM → esquerda -->
  <text x="242" y="795" text-anchor="middle" font-size="10" fill="#1D9E75" font-weight="500">SIM</text>
  <line x1="270" y1="780" x2="200" y2="780" stroke="#1D9E75" stroke-width="1.5"/>
  <line x1="200" y1="780" x2="200" y2="830" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- NÃO → direita -->
  <text x="498" y="795" text-anchor="middle" font-size="10" fill="#D85A30" font-weight="500">NÃO</text>
  <line x1="470" y1="780" x2="540" y2="780" stroke="#D85A30" stroke-width="1.5"/>
  <line x1="540" y1="780" x2="540" y2="830" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr-coral)"/>

  <!-- ============ 9a. AÇÕES (esquerda) ============ -->
  <rect x="100" y="830" width="200" height="112" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="200" y="853" text-anchor="middle" font-size="11" font-weight="500" fill="#085041">Executar ação</text>
  <!-- lista de ações -->
  <text x="120" y="873" font-size="10" fill="#0F6E56">· agendar consulta no Supabase</text>
  <text x="120" y="889" font-size="10" fill="#0F6E56">· cadastrar paciente</text>
  <text x="120" y="905" font-size="10" fill="#0F6E56">· enviar link de pagamento</text>
  <text x="120" y="921" font-size="10" fill="#BA7517">· escalar para humano ⚠</text>
  <text x="120" y="937" font-size="10" fill="#0F6E56">· salvar nota no prontuário</text>

  <!-- ============ 9b. SÓ RESPOSTA (direita) ============ -->
  <rect x="440" y="830" width="200" height="64" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
  <text x="540" y="855" text-anchor="middle" font-size="11" font-weight="500" fill="#4A1B0C">Apenas resposta</text>
  <text x="540" y="873" text-anchor="middle" font-size="10" fill="#993C1D">texto informativo,</text>
  <text x="540" y="889" text-anchor="middle" font-size="10" fill="#993C1D">pergunta, confirmação</text>

  <!-- setas de volta ao centro → EvoAPI reply -->
  <line x1="200" y1="942" x2="200" y2="980" stroke="#888" stroke-width="1.5"/>
  <line x1="540" y1="894" x2="540" y2="980" stroke="#888" stroke-width="1.5"/>
  <line x1="200" y1="980" x2="540" y2="980" stroke="#888" stroke-width="1.5"/>
  <line x1="370" y1="980" x2="370" y2="1004" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ 10. RESPOSTA FINAL ============ -->
  <rect x="230" y="1004" width="280" height="52" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="370" y="1027" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">EvoAPI → WhatsApp</text>
  <text x="370" y="1044" text-anchor="middle" font-size="10" fill="#0F6E56">resposta entregue ao paciente</text>

  <!-- ============ LEGENDA ============ -->
  <rect x="530" y="72" width="190" height="108" rx="8" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="625" y="91" text-anchor="middle" font-size="10" font-weight="500" fill="#888">Legenda</text>
  <rect x="544" y="100" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="560" y="110" font-size="10" fill="#444">WhatsApp / Resposta</text>
  <rect x="544" y="118" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="560" y="128" font-size="10" fill="#444">OpenAI</text>
  <rect x="544" y="136" width="10" height="10" rx="2" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="560" y="146" font-size="10" fill="#444">Processamento interno</text>
  <rect x="544" y="154" width="10" height="10" rx="2" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
  <text x="560" y="164" font-size="10" fill="#444">Resposta simples</text>
</svg>
